<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="../static/css/style.css">
  </head>
  <body>
    <div class="container" id="mapPage">
        <h1>Global Map</h1>
        <p>Explore situation reports worldwide</p>

        <div class="search-wrapper">
            <div class="search-row">
                <div class="search-input-area">
                    <input type="text" name="searchBar" id="searchBar" placeholder="Search for a city by name or its country...">
                    <ul id="suggestions"></ul>
                </div>
                <button type="button" id="searchButton">Search</button>
            </div>
        </div>

        <div class="map-wrapper">
            <div id="map" aria-label="Interactive world map"></div>
            <div class="zoom-controls">
                <button type="button" onclick="zoom(true)">+</button>
                <button type="button" onclick="zoom(false)">-</button>
                <button type="button" onclick="resetMap()">Reset</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const searchBar = document.getElementById("searchBar");
        const searchButton = document.getElementById("searchButton");
        const suggestions = document.getElementById("suggestions");
        const searchWrapper = document.querySelector(".search-wrapper");
        const cityData = [
            { name: "Perth, Australia", country: "Australia", lat: -31.9523, lng: 115.8613 },
            { name: "Sydney, Australia", country: "Australia", lat: -33.8688, lng: 151.2093 },
            { name: "New York, United States of America", country: "United States of America", lat: 40.7128, lng: -74.0060 },
            { name: "New Delhi, India", country: "India", lat: 28.6139, lng: 77.2090 },
            { name: "Tokyo, Japan", country: "Japan", lat: 35.6762, lng: 139.6503 }
        ];
        const defaultView = { center: [20, 0], zoom: 2 };
        const map = L.map("map", {
            center: defaultView.center,
            zoom: defaultView.zoom,
            minZoom: 2,
            maxZoom: 8,
            zoomControl: false,
            worldCopyJump: false,
            maxBounds: [[-85, -180], [85, 180]],
            maxBoundsViscosity: 1.0
        });
        const cityMarkerLayer = L.layerGroup().addTo(map);
        let suggestionsOpen = false;

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            noWrap: true,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        function initializeCityMarkers() {
            cityMarkerLayer.clearLayers();

            cityData.forEach((city) => {
                const marker = L.marker([city.lat, city.lng]).addTo(cityMarkerLayer);
                marker.bindPopup(`<strong>${city.name}</strong><br>${city.country}`);

                marker.on("click", function () {
                    searchBar.value = city.name;
                    clearSuggestions();
                    focusCity(city);
                });
            });
        }

        function clearSuggestions() {
            suggestions.innerHTML = "";
            suggestionsOpen = false;
        }

        function focusCity(city) {
            const latlng = [city.lat, city.lng];
            map.setView(latlng, 5);
        }

        function search() {
            const query = searchBar.value.toLowerCase();
            let filteredCities;

            if (!query.trim()) {
                filteredCities = cityData.slice(0, 5);
            } else {
                filteredCities = cityData.filter((item) => (
                    item.name.toLowerCase().includes(query) || item.country.toLowerCase().includes(query)
                ));
            }

            suggestions.innerHTML = "";
            const length = filteredCities.length < 5 ? filteredCities.length : 5;
            for (let i = 0; i < length; i++) {
                const suggestion = document.createElement("li");
                suggestion.textContent = filteredCities[i].name;
                suggestions.appendChild(suggestion); 
            }
            suggestionsOpen = length > 0;
        }

        function autocomplete(event) {
            event.stopPropagation();

            if (event.target.tagName === "LI") {
                const selectedCity = cityData.find((item) => item.name === event.target.textContent);

                if (selectedCity) {
                    searchBar.value = selectedCity.name;
                    clearSuggestions();
                    focusCity(selectedCity);
                }
            }
        }

        function minimise(event) {
            if (!searchWrapper.contains(event.target)) {
                clearSuggestions();
                return;
            }
        }

        function onSearchBarClick(event) {
            event.stopPropagation();

            if (suggestionsOpen) {
                clearSuggestions();
            } else {
                search();
            }
        }

        function onSearchSubmit(event) {
            event.stopPropagation();

            const query = searchBar.value.trim().toLowerCase();
            if (!query) {
                alert("Please enter a location to search.");
                return;
            }

            const selectedCity = cityData.find((item) => (
                item.name.toLowerCase() === query ||
                item.name.toLowerCase().includes(query) ||
                item.country.toLowerCase().includes(query)
            ));

            if (!selectedCity) {
                alert("No matching location found.");
                return;
            }

            searchBar.value = selectedCity.name;
            focusCity(selectedCity);
            clearSuggestions();

            // Stub for future navigation to a location-specific report page.
            alert("Stub: open report page for " + selectedCity.name);
        }

        function onSearchBarKeyDown(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                onSearchSubmit(event);
            }
        }

        function zoom(zoomIn) {
            zoomIn ? map.zoomIn() : map.zoomOut();
        }

        function resetMap() {
            map.setView(defaultView.center, defaultView.zoom);
        }

        searchBar.addEventListener("click", onSearchBarClick);
        searchBar.addEventListener("input", search);
        searchBar.addEventListener("keydown", onSearchBarKeyDown);
        searchButton.addEventListener("click", onSearchSubmit);
        document.body.addEventListener("click", minimise);
        suggestions.addEventListener("click", autocomplete);
        initializeCityMarkers();
    </script>
  </body>
</html>
