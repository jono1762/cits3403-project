<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Explorer</title>
    <link rel="stylesheet" href="../static/css/style.css">
  </head>
  <body>
    <h1>Global Map</h1>
    <p>Explore situation reports worldwide</p>

    <input type="text" name="searchBar" id="searchBar" placeholder="Search for a city by name or its country...">
    <ul id="suggestions"></ul>

    <br>
    <br>
    <img src="../static/images/world-map.png" alt="World Map" id="map">

    <script>
        const searchBar = document.getElementById("searchBar");
        const cities = ["Perth, Australia", "Sydney, Australia", "Melbourne, Australia", "Brisbane, Australia", "Adelaide, Australia"];
        const suggestions = document.getElementsByTagName("ul")[0];
        var clicked = false;

        function search() {
            if (clicked) {
                suggestions.innerHTML = "";
                clicked = false;
                return;
            }
            clicked = true;

            const query = searchBar.value.toLowerCase();
            const filteredCities = cities.filter((item) => item.toLowerCase().includes(query));

            suggestions.innerHTML = "";
            const length = filteredCities.length < 5 ? filteredCities.length : 5;
            for (let i = 0; i < length; i++) {
                const suggestion = document.createElement("li");
                suggestion.textContent = filteredCities[i];
                suggestions.appendChild(suggestion); 
            }
        }

        function autocomplete(event) {
            if (event.target.tagName === "LI") {
                searchBar.value = event.target.textContent;
                suggestions.innerHTML = "";

                // Stub - will replace with functionality to visit reports page for corresponding location
                alert("Welcome to " + searchBar.value + "!")
            }
        }

        // document.addEventListener("DOMContentLoaded", () => {suggestions.style.borderStyle = "none"});
        searchBar.addEventListener("click", search);
        searchBar.addEventListener("keyup", search);
        suggestions.addEventListener("click", function () { autocomplete(event)});
    </script>
  </body>
</html>
