{% extends "base.html" %}

{% block content %}
<h1>Report API Tester</h1>
<p class="text-muted">Quick manual tester for <code>POST /api/reports</code> — no Postman needed.</p>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><strong>Submit a report</strong></div>
            <div class="card-body">
                <form id="report-form">
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select id="category_id" class="form-select" required>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}" style="color: {{ cat.marker_color }}">
                                    {{ cat.id }} — {{ cat.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description <span class="text-muted">(optional)</span></label>
                        <textarea id="description" class="form-control" rows="3" placeholder="What's going on here?"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">POST /api/reports</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><strong>Last API response</strong></div>
            <div class="card-body">
                <p id="status-line" class="text-muted mb-2">(no request yet)</p>
                <pre id="response-box" class="bg-light p-2 mb-0" style="min-height: 150px;"></pre>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('report-form').addEventListener('submit', async (event) => {
    event.preventDefault();

    const payload = {
        category_id: parseInt(document.getElementById('category_id').value, 10),
        description: document.getElementById('description').value,
    };

    const response = await fetch('/api/reports', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
    });

    const body = await response.json().catch(() => ({}));
    document.getElementById('status-line').textContent =
        `HTTP ${response.status} ${response.statusText}`;
    document.getElementById('response-box').textContent =
        JSON.stringify(body, null, 2);
});
</script>
{% endblock %}
